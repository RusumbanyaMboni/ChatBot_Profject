name: .NET CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0'

    - name: Restore
      run: dotnet restore chatBot_3_Test_3/chatBot_3_Test_3.csproj

    - name: Build
      run: dotnet build chatBot_3_Test_3/chatBot_3_Test_3.csproj --configuration Release
